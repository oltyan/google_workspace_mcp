services:
  gws_mcp:
    build: .
    container_name: gws_mcp
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_MCP_CREDENTIALS_DIR=/app/store_creds
      - GOOGLE_OAUTH_REDIRECT_URI=https://mcp.musicalmycology.org/oauth2callback
    volumes:
      - store_creds:/app/store_creds:rw
    env_file:
      - .env

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run
    volumes:
      - ${HOME}/.cloudflared:/etc/cloudflared/creds:ro
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    environment:
      - TUNNEL_CONFIG=/etc/cloudflared/config.yml
    depends_on:
      gws_mcp:
        condition: service_healthy

volumes:
  store_creds: